name: edulearn
description: EduLearn Flutter App
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Routing / UI
  go_router: ^14.2.0
  phosphor_flutter: ^2.1.0

  # Network
  http: ^1.2.0
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.3

  # Files / Excel / Share
  file_picker: ^8.1.2
  excel: ^4.0.2
  share_plus: ^10.0.0
  path_provider: ^2.1.4

  # Media / Scanner / Location
  video_player: ^2.9.1
  chewie: ^1.7.5
  mobile_scanner: ^5.2.3
  geolocator: ^12.0.0

  # QR Generation
  qr_flutter: ^4.1.0

  # URL
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true